<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Confere aí</h1>
    <nav>
        <a href="#">Início</a>
    </nav>
</header>

<main>

<h2>Descubra a verdade passando o mouse</h2>

<section>

<article class="cartao">
    <div class="cartao-interno">

        <!-- Frente -->
        <div class="cartao-frente">
            <img
                src="https://www.mypokecard.com/es/Galeria/my/galery/eEdMVX8Mgjsy.jpg"
                alt="Carta Pokémon personalizada"
                class="cartao-imagem">

            <p>Você conhece esse Pokémon?</p>
        </div>

        <!-- Verso -->
        <div class="cartao-verso">
            <img
                src="https://www.mypokecard.com/es/Galeria/my/galery/eEdMVX8Mgjsy.jpg"
                alt="Carta Pokémon personalizada"
                class="cartao-imagem">

            <p>Essa é uma carta personalizada criada no MyPokeCard. Ela representa um Pokémon fictício feito pelo usuário para fins de diversão. :contentReference[oaicite:0]{index=0}
</p>
        </div>

    </div>
</article>

</section>

</main>

<footer>
    <p>Projeto feito por Isaque z</p>
</footer>

</body>
</html>
