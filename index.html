<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Pokémon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ececec;
}

header{
    background:#e53935;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

h2{
    text-align:center;
    margin:30px 0;
}

section{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:20px;
}

.cartao{
    width:250px;
    height:360px;
    perspective:1000px;
}

.cartao-interno{
    width:100%;
    height:100%;
    position:relative;
    transition:transform .8s;
    transform-style:preserve-3d;
}

.cartao:hover .cartao-interno{
    transform:rotateY(180deg);
}

.cartao-frente,
.cartao-verso{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:15px;
    text-align:center;
}

.cartao-verso{
    transform:rotateY(180deg);
}

.cartao-imagem{
    width:200px;
    border-radius:10px;
    margin-bottom:15px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>Projeto Pokémon</h1>

    <nav>
        <a href="#">Início</a>
    </nav>
</header>

<main>

<h2>Passe o mouse sobre as cartas</h2>

<section>

    <!-- Carta 1 -->
    <article class="cartao">
        <div class="cartao-interno">

            <div class="cartao-frente">
                <img
                src="https://www.mypokecard.com/es/Galeria/my/galery/eEdMVX8Mgjsy.jpg"
                class="cartao-imagem"
                alt="Carta Pokémon">

                <p>Você conhece esse Pokémon?</p>
            </div>

            <div class="cartao-verso">
                <img
                src="https://www.mypokecard.com/es/Galeria/my/galery/eEdMVX8Mgjsy.jpg"
                class="cartao-imagem"
                alt="Carta Pokémon">

                <p>
                    Carta personalizada criada no MyPokeCard.
                </p>
            </div>

        </div>
    </article>

    <!-- Carta 2 -->
    <article class="cartao">
        <div class="cartao-interno">

            <div class="cartao-frente">
                <img
                src="https://www.mypokecard.com/en/Gallery/my/galery/jayVLu4sWu.jpg"
                class="cartao-imagem"
                alt="Carta Pokémon">

                <p>Conhece esse também?</p>
            </div>

            <div class="cartao-verso">
                <img
                src="https://www.mypokecard.com/en/Gallery/my/galery/jayVLu4sWu.jpg"
                class="cartao-imagem"
                alt="Carta Pokémon">

                <p>
                    Segunda carta personalizada adicionada ao projeto.
                </p>
            </div>

        </div>
    </article>

</section>

</main>

<footer>
    <p>Projeto feito por Isaque Z</p>
</footer>

</body>
</html>
